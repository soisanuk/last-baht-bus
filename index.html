<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05001a">
<link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Last Baht Bus — a Pattaya misadventure</title>
<style>
  :root {
    --bg: #05001a;
    --panel: #0d0015;
    --text: #e8c0d8;
    --bright: #ffcce8;
    --pink: #ff1493;
    --cyan: #00e5ff;
    --violet: #bf5fff;
    --yellow: #ffe600;
    --green: #00ff7f;
    --red: #ff3355;
  }
  /* Thai script reads ~25% smaller than Latin at equal size (the x-height
     pays for stacked vowels and tone marks), so glyphs in the Thai range get
     their own face at 133%. unicode-range keeps Latin out; the local() list
     covers macOS/iOS (Thonburi), Android (Noto), Windows (Leelawadee/Tahoma).
     Browsers without size-adjust just render Thai at normal size. */
  @font-face {
    font-family: "Thai XL";
    src: local("Thonburi"), local("Noto Sans Thai"), local("Leelawadee UI"), local("Tahoma");
    size-adjust: 133%;
    unicode-range: U+0E00-0E7F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Thai XL", "SF Mono", "Cascadia Mono", Menlo, Consolas, "Noto Sans Thai", monospace;
    font-size: 15px;
    line-height: 1.55;
    display: flex;
    justify-content: center;
  }
  #shell {
    width: 100%;
    max-width: 820px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header {
    padding: .55rem 1rem .45rem;
    border-bottom: 1px solid #ff149340;
    text-align: center;
    flex-shrink: 0;
    position: relative;
  }
  #mute-btn {
    position: absolute;
    right: .7rem;
    top: .55rem;
    background: none;
    border: 1px solid #ff149340;
    border-radius: 8px;
    font-size: 1rem;
    padding: .15rem .4rem;
    cursor: pointer;
  }
  header .title {
    color: var(--yellow);
    font-weight: bold;
    letter-spacing: .14em;
    text-shadow: 0 0 14px #ffe60080, 0 0 34px #ffe60030;
  }
  header .sub {
    color: var(--violet);
    font-size: .72rem;
    letter-spacing: .1em;
  }
  #term-out {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.1rem 1.4rem;
    scrollbar-width: thin;
    scrollbar-color: #ff149350 transparent;
  }
  .t-line { margin: .12rem 0; white-space: pre-wrap; word-break: break-word; }
  .t-line + .t-line.t-room { margin-top: .8rem; }
  .t-echo  { color: var(--pink); margin-top: .7rem; }
  .t-room  { color: var(--yellow); font-weight: bold;
             text-shadow: 0 0 12px #ffe60060; }
  .t-thai  { color: var(--cyan); text-shadow: 0 0 10px #00e5ff50; }
  /* pre-formatted Thai blocks (the 7-Eleven receipt) whose dot-leader columns
     assume even glyph widths: opt them OUT of the 133% "Thai XL" face so the
     columns line up the way they did before the trainer-font bump. */
  .t-receipt { color: var(--cyan); text-shadow: 0 0 10px #00e5ff50;
               font-family: "SF Mono", "Cascadia Mono", Menlo, Consolas, "Noto Sans Thai", monospace; }
  .t-dim   { color: var(--violet); font-size: .88em; }
  .t-alert { color: var(--red); text-shadow: 0 0 10px #ff335550; }
  .t-win   { color: var(--yellow); font-weight: bold;
             text-shadow: 0 0 16px #ffe60090, 0 0 40px #ffe60040; }
  #chips {
    display: flex;
    gap: .4rem;
    overflow-x: auto;
    padding: .45rem .8rem;
    border-top: 1px solid #ff149330;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: #12001e;
    color: var(--cyan);
    border: 1px solid #00e5ff50;
    border-radius: 14px;
    font: inherit;
    font-size: .78rem;
    padding: .22rem .7rem;
    cursor: pointer;
  }
  .chip:active { background: #1e0030; }
  #term-suggest {
    display: none;
    gap: .4rem;
    overflow-x: auto;
    padding: .3rem .9rem;
    background: var(--panel);
    border-top: 1px solid #ff149320;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #term-suggest::-webkit-scrollbar { display: none; }
  #term-suggest span {
    color: #e8c0d8;
    background: #1a0028;
    border: 1px solid #ff149330;
    border-radius: 4px;
    padding: .1rem .5rem;
    white-space: nowrap;
    cursor: pointer;
    font-size: .85em;
  }
  #term-suggest span:active { background: #2a0040; }
  #input-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .55rem .9rem calc(.55rem + env(safe-area-inset-bottom));
    border-top: 1px solid #ff149340;
    background: var(--panel);
    flex-shrink: 0;
  }
  #input-row .prompt {
    color: var(--pink);
    text-shadow: 0 0 10px #ff149380;
    font-weight: bold;
  }
  #term-in {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--bright);
    font: inherit;
    caret-color: var(--pink);
  }
  @media (min-width: 700px) {
    #shell { border-left: 1px solid #ff149330; border-right: 1px solid #ff149330; }
  }

  /* ── The advert: a neon bar-sign for the trainer ──────────────────────── */
  #ad {
    display: none;
    position: fixed;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    width: 172px;
    padding: .9rem .8rem;
    text-align: center;
    text-decoration: none;
    background: #0d0015;
    border: 2px dashed #ff1493;
    border-radius: 10px;
    box-shadow: 0 0 22px #ff149335, inset 0 0 22px #ff149315;
    animation: ad-flicker 7s infinite;
  }
  #ad .ad-hey {
    color: var(--yellow);
    font-weight: bold;
    letter-spacing: .1em;
    font-size: .82rem;
    text-shadow: 0 0 12px #ffe60090;
  }
  #ad .ad-line {
    color: var(--text);
    font-size: .74rem;
    margin: .5rem 0;
    line-height: 1.5;
  }
  #ad .ad-cta {
    display: inline-block;
    color: var(--cyan);
    border: 1px solid #00e5ff70;
    border-radius: 12px;
    padding: .2rem .7rem;
    font-size: .78rem;
    font-weight: bold;
    text-shadow: 0 0 10px #00e5ff70;
  }
  #ad .ad-sub { color: var(--violet); font-size: .62rem; margin-top: .45rem; }
  #ad:hover { box-shadow: 0 0 34px #ff149360, inset 0 0 26px #ff149325; }
  @keyframes ad-flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: .35; }
    94% { opacity: 1; }
    96% { opacity: .6; }
    97% { opacity: 1; }
  }
  /* only where there's real gutter beside the 820px shell */
  @media (min-width: 1220px) { #ad { display: block; } }

  /* narrow screens: one cheeky line under the header instead */
  #ad-mini {
    display: block;
    text-align: center;
    font-size: .68rem;
    color: var(--violet);
    text-decoration: none;
    padding: .25rem .5rem;
    border-bottom: 1px solid #ff149320;
    flex-shrink: 0;
  }
  #ad-mini b { color: var(--cyan); }
  @media (min-width: 1220px) { #ad-mini { display: none; } }
</style>
</head>
<body>
<div id="shell">
  <header>
    <button id="mute-btn" title="Toggle music">🔊</button>
    <div class="title">THE LAST BAHT BUS</div>
    <div class="sub">a Pattaya misadventure · ❖ Soi Sanuk ❖</div>
  </header>
  <a id="ad-mini" href="https://soisanuk.github.io/" target="_blank" rel="noopener">
    😘 The girls speak two languages. You barely speak one. <b>Learn Thai →</b>
  </a>
  <div id="term-out"></div>
  <div id="chips">
    <button class="chip" data-cmd="look">look</button>
    <button class="chip" data-cmd="n">N</button>
    <button class="chip" data-cmd="s">S</button>
    <button class="chip" data-cmd="e">E</button>
    <button class="chip" data-cmd="w">W</button>
    <button class="chip" data-cmd="in">in</button>
    <button class="chip" data-cmd="out">out</button>
    <button class="chip" data-cmd="i">inv</button>
    <button class="chip" data-cmd="take ">take…</button>
    <button class="chip" data-cmd="talk to ">talk…</button>
    <button class="chip" data-cmd="ask ">ask…</button>
    <button class="chip" data-cmd="wai">wai</button>
    <button class="chip" data-cmd="read sign">sign</button>
    <button class="chip" data-cmd="light on">light</button>
    <button class="chip" data-cmd="help">help</button>
  </div>
  <div id="term-suggest"></div>
  <div id="input-row">
    <span class="prompt">❯</span>
    <input id="term-in" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" placeholder="what do you do?">
  </div>
</div>
<a id="ad" href="https://soisanuk.github.io/" target="_blank" rel="noopener">
  <div class="ad-hey">HEY HANDSOME 😘</div>
  <div class="ad-line">The girls speak two languages.<br>You barely speak one.<br>
    Candy notices these things.</div>
  <span class="ad-cta">LEARN THAI →</span>
  <div class="ad-sub">SOI SANUK trainer · free · no signup<br>❖ PATTAYA EDITION ❖</div>
</a>
<script src="js/thai.js"></script>
<script src="js/news-data.js"></script>
<script src="js/world.js"></script>
<script src="js/games.js"></script>
<script src="js/engine.js"></script>
<script src="js/tts.js"></script>
<script src="js/audio.js"></script>
<script src="js/term.js"></script>
<script src="js/main.js"></script>
</body>
</html>
