<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05001a">
<link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Last Baht Bus — a Pattaya misadventure</title>
<style>
  :root {
    --bg: #05001a;
    --panel: #0d0015;
    --text: #e8c0d8;
    --bright: #ffcce8;
    --pink: #ff1493;
    --cyan: #00e5ff;
    --violet: #bf5fff;
    --yellow: #ffe600;
    --green: #00ff7f;
    --red: #ff3355;
  }
  /* Thai script reads ~25% smaller than Latin at equal size (the x-height
     pays for stacked vowels and tone marks), so glyphs in the Thai range get
     their own face at 133%. unicode-range keeps Latin out; the local() list
     covers macOS/iOS (Thonburi), Android (Noto), Windows (Leelawadee/Tahoma).
     Browsers without size-adjust just render Thai at normal size. */
  @font-face {
    font-family: "Thai XL";
    src: local("Thonburi"), local("Noto Sans Thai"), local("Leelawadee UI"), local("Tahoma");
    size-adjust: 133%;
    unicode-range: U+0E00-0E7F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Thai XL", "SF Mono", "Cascadia Mono", Menlo, Consolas, "Noto Sans Thai", monospace;
    font-size: 15px;
    line-height: 1.55;
    display: flex;
    justify-content: center;
  }
  #shell {
    width: 100%;
    max-width: 820px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  /* Floating action buttons, top-right: the bar bell (tap-to-ring, shown in bars
     via _inBar) and the message glyph (shown when texts are unread, via
     _unreadCount). term.js toggles each button's .show independently. A flex
     column so they stack with no gap and either can appear alone — a text on the
     street shows the message glyph in the top slot, a bar shows the bell, and a
     text at the bar shows both. */
  #fab-stack {
    position: absolute;
    right: 14px;
    top: calc(env(safe-area-inset-top) + 5.6rem);
    z-index: 40;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  }
  #bell-fab, #msg-fab {
    display: none;
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 1px solid #ff1493aa;
    background: radial-gradient(circle at 50% 38%, #33004d, #12001e);
    color: var(--pink);
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: fab-pulse 1.9s ease-out infinite;
  }
  #bell-fab.show, #msg-fab.show { display: block; }
  #bell-fab:active, #msg-fab:active { background: #46006b; transform: scale(0.94); }
  @keyframes fab-pulse {
    0%   { box-shadow: 0 0 7px 1px #ff149377, 0 0 0 0 #ff149366; }
    70%  { box-shadow: 0 0 11px 2px #ff149377, 0 0 0 13px #ff149300; }
    100% { box-shadow: 0 0 7px 1px #ff149377, 0 0 0 0 #ff149300; }
  }
  @media (prefers-reduced-motion: reduce) { #bell-fab, #msg-fab { animation: none; } }
  header {
    padding: .55rem 1rem .45rem;
    border-bottom: 1px solid #ff149340;
    text-align: center;
    flex-shrink: 0;
    position: relative;
  }
  #mute-btn {
    position: absolute;
    right: .7rem;
    top: .55rem;
    background: none;
    border: 1px solid #ff149340;
    border-radius: 8px;
    font-size: 1rem;
    padding: .15rem .4rem;
    cursor: pointer;
  }
  header .title {
    color: var(--yellow);
    font-weight: bold;
    letter-spacing: .14em;
    text-shadow: 0 0 14px #ffe60080, 0 0 34px #ffe60030;
  }
  header .sub {
    color: var(--violet);
    font-size: .72rem;
    letter-spacing: .1em;
  }
  #term-out {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.1rem 1.4rem;
    scrollbar-width: thin;
    scrollbar-color: #ff149350 transparent;
  }
  .t-line { margin: .12rem 0; white-space: pre-wrap; word-break: break-word; }
  .t-line + .t-line.t-room { margin-top: .8rem; }
  .t-echo  { color: var(--pink); margin-top: .7rem; }
  .t-room  { color: var(--yellow); font-weight: bold;
             text-shadow: 0 0 12px #ffe60060; }
  .t-thai  { color: var(--cyan); text-shadow: 0 0 10px #00e5ff50; }
  /* pre-formatted Thai blocks (the 7-Eleven receipt) whose dot-leader columns
     assume even glyph widths: opt them OUT of the 133% "Thai XL" face so the
     columns line up the way they did before the trainer-font bump. */
  .t-receipt { color: var(--cyan); text-shadow: 0 0 10px #00e5ff50;
               font-family: "SF Mono", "Cascadia Mono", Menlo, Consolas, "Noto Sans Thai", monospace; }
  .t-dim   { color: var(--violet); font-size: .88em; }
  .t-alert { color: var(--red); text-shadow: 0 0 10px #ff335550; }
  /* action breadcrumb ("· You asked Nok about beer") — a quiet post-command
     anchor so a long scroll doesn't lose who/where you just acted. */
  .t-trace { color: var(--violet); font-size: .8em; opacity: .72;
             margin-top: .3rem; letter-spacing: .01em; }
  .t-trace .kw { color: #d9c2f2; font-weight: 600; }
  /* actionable words — names, items, exits, command hints. Bold and a shade
     brighter than their line; tap for quick actions, hold for the full list. */
  .kw { font-weight: 700; color: var(--bright); cursor: pointer;
        -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  .kw:hover { text-decoration: underline dotted; }
  .t-dim .kw { color: #d9c2f2; }
  .t-alert .kw, .t-win .kw, .t-room .kw, .t-thai .kw { color: inherit; }
  /* tappable Thai: dotted underline says "the dictionary is one tap away" */
  .kw[data-k="thai"] { text-decoration: underline dotted; text-underline-offset: 4px;
                       text-decoration-color: #00e5ff70; }
  /* pixel-art portraits: inline avatars on the Here:/rail lines and a
     header bust on a character's flyout wheel */
  .kw-av { width: 20px; height: 20px; image-rendering: pixelated;
           vertical-align: -4px; margin-right: 4px; border-radius: 4px;
           border: 1px solid #ff149340; }
  .fly-head { display: flex; align-items: center; gap: .6rem;
              padding: .35rem .7rem .45rem;
              border-bottom: 1px solid #ff149330; margin-bottom: 2px;
              color: var(--yellow); font-weight: 700; }
  .fly-av { width: 44px; height: 44px; image-rendering: pixelated;
            border-radius: 6px; border: 1px solid #ff149360;
            box-shadow: 0 0 10px #ff149330; }
  /* the flyout wheel */
  #flyout {
    position: fixed; z-index: 50;
    display: flex; flex-direction: column; gap: 2px;
    background: var(--panel);
    border: 1px solid var(--pink);
    border-radius: 10px;
    box-shadow: 0 0 18px #ff149360, 0 4px 24px #000c;
    padding: .3rem;
    max-width: min(78vw, 320px);
  }
  #flyout button {
    background: none; border: none; text-align: left;
    font: inherit; color: var(--bright);
    padding: .45rem .7rem; min-height: 40px;
    border-radius: 7px; cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  #flyout button:hover, #flyout button:active {
    background: #ff149322; color: #fff;
  }
  .t-win   { color: var(--yellow); font-weight: bold;
             text-shadow: 0 0 16px #ffe60090, 0 0 40px #ffe60040; }
  #chips {
    display: flex;
    gap: .4rem;
    overflow-x: auto;
    padding: .45rem .8rem;
    border-top: 1px solid #ff149330;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: #12001e;
    color: var(--cyan);
    border: 1px solid #00e5ff50;
    border-radius: 14px;
    font: inherit;
    font-size: .78rem;
    padding: .22rem .7rem;
    cursor: pointer;
  }
  .chip:active { background: #1e0030; }
  #term-suggest {
    display: none;
    gap: .4rem;
    overflow-x: auto;
    padding: .3rem .9rem;
    background: var(--panel);
    border-top: 1px solid #ff149320;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #term-suggest::-webkit-scrollbar { display: none; }
  #term-suggest span {
    color: #e8c0d8;
    background: #1a0028;
    border: 1px solid #ff149330;
    border-radius: 4px;
    padding: .1rem .5rem;
    white-space: nowrap;
    cursor: pointer;
    font-size: .85em;
  }
  #term-suggest span:active { background: #2a0040; }
  #input-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .55rem .9rem calc(.55rem + env(safe-area-inset-bottom));
    border-top: 1px solid #ff149340;
    background: var(--panel);
    flex-shrink: 0;
  }
  #input-row .prompt {
    color: var(--pink);
    text-shadow: 0 0 10px #ff149380;
    font-weight: bold;
  }
  #term-in {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--bright);
    font: inherit;
    caret-color: var(--pink);
  }
  #term-send {
    flex-shrink: 0;
    background: #12001e;
    color: var(--pink);
    border: 1px solid #ff149360;
    border-radius: 10px;
    font: inherit;
    font-size: 1rem;
    min-width: 44px;
    min-height: 38px;
    cursor: pointer;
    text-shadow: 0 0 8px #ff149380;
  }
  #term-send:active { background: #2a0040; }
  @media (min-width: 700px) {
    #shell { border-left: 1px solid #ff149330; border-right: 1px solid #ff149330; }
  }

  /* ── The advert: a neon bar-sign for the trainer ──────────────────────── */
  #ad {
    display: none;
    position: fixed;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    width: 172px;
    padding: .9rem .8rem;
    text-align: center;
    text-decoration: none;
    background: #0d0015;
    border: 2px dashed #ff1493;
    border-radius: 10px;
    box-shadow: 0 0 22px #ff149335, inset 0 0 22px #ff149315;
    animation: ad-flicker 7s infinite;
  }
  #ad .ad-hey {
    color: var(--yellow);
    font-weight: bold;
    letter-spacing: .1em;
    font-size: .82rem;
    text-shadow: 0 0 12px #ffe60090;
  }
  #ad .ad-line {
    color: var(--text);
    font-size: .74rem;
    margin: .5rem 0;
    line-height: 1.5;
  }
  #ad .ad-cta {
    display: inline-block;
    color: var(--cyan);
    border: 1px solid #00e5ff70;
    border-radius: 12px;
    padding: .2rem .7rem;
    font-size: .78rem;
    font-weight: bold;
    text-shadow: 0 0 10px #00e5ff70;
  }
  #ad .ad-sub { color: var(--violet); font-size: .62rem; margin-top: .45rem; }
  #ad:hover { box-shadow: 0 0 34px #ff149360, inset 0 0 26px #ff149325; }
  @keyframes ad-flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: .35; }
    94% { opacity: 1; }
    96% { opacity: .6; }
    97% { opacity: 1; }
  }
  /* only where there's real gutter beside the 820px shell */
  @media (min-width: 1220px) { #ad { display: block; } }

  /* narrow screens: one cheeky line under the header instead */
  #ad-mini {
    display: block;
    text-align: center;
    font-size: .68rem;
    color: var(--violet);
    text-decoration: none;
    padding: .25rem .5rem;
    border-bottom: 1px solid #ff149320;
    flex-shrink: 0;
  }
  #ad-mini b { color: var(--cyan); }
  @media (min-width: 1220px) { #ad-mini { display: none; } }

  /* ── vendored word-card modal (source of truth: trainer index.html) ──── */
  /* the trainer's palette names, same neon values */
  :root {
    --gold: #ff1493; --saffron: #ffe600; --deep-saffron: #bf5fff;
    --royal-blue: #4169e1; --jade: #00cc66; --parchment: #e8c0d8;
    --surface: #16032b; --border: #43155e; --dim: #a487b8;
  }
.divider-accent {
  border: none;
  border-top: 1px solid var(--royal-blue);
  margin: 0.4rem 0;
}
.example-block {
  background: linear-gradient(90deg, rgba(244,196,48,0.06) 0%, #1e1208 30%);
  border: 1px solid var(--border);
  border-left: 3px solid var(--saffron);
  border-radius: 6px;
  padding: 0.7rem 1rem;
  margin: 0.5rem 0 0.3rem;
}
.example-thai {
  font-family: 'Noto Sans Thai', 'Leelawadee UI', serif;
  font-size: 1.45rem;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.example-thai .highlight {
  color: var(--gold);
  font-weight: bold;
  text-decoration: underline;
  text-decoration-color: var(--deep-saffron);
  text-underline-offset: 3px;
}
.example-rtgs {
  font-size: 0.82rem;
  color: var(--dim);
  margin-bottom: 0.2rem;
  font-style: italic;
}
.example-rtgs .highlight { color: var(--saffron); font-style: normal; }
.example-en {
  font-size: 0.85rem;
  color: var(--parchment);
}
.example-speak {
  float: right;
  margin: -0.1rem -0.3rem 0 0.5rem;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--dim);
  font-size: 1rem;
  line-height: 1;
  padding: 0.18rem 0.4rem;
  cursor: pointer;
  transition: color 0.12s, border-color 0.12s;
}
.example-speak:hover { color: var(--gold); border-color: var(--gold); }
.example-speak.speaking { color: var(--saffron); border-color: var(--saffron); }

/* ── Word hover tokens ───────────────────────────────────────────────────── */
.w-token {
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.1s, color 0.1s;
  padding: 0 1px;
}
.w-token:hover {
  background: rgba(212, 175, 54, 0.18);
  color: var(--saffron);
}
#wc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10000;
  align-items: center;
  justify-content: center;
}
#wc-overlay.open { display: flex; }
/* Each stacked card sits in its own full-screen layer */
.wc-layer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.72);
}
.wc-layer:not(:last-child) { pointer-events: none; }
.wc-card {
  background: var(--surface);
  border: 2px solid var(--gold);
  border-radius: 8px;
  padding: 1.8rem 2rem 1.4rem;
  max-width: 480px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  pointer-events: all;
}
.wc-close {
  position: absolute;
  top: 0.6rem; right: 0.8rem;
  background: none; border: none;
  color: var(--dim); font-size: 1.3rem;
  cursor: pointer; line-height: 1;
}
.wc-close:hover { color: var(--text); }
.wc-back {
  background: none; border: none;
  color: var(--saffron); font-size: 0.88rem;
  cursor: pointer; padding: 0;
  margin-bottom: 0.8rem;
  display: none;
}
.wc-back:hover { color: var(--gold); }
.wc-thai {
  font-family: 'Noto Sans Thai', serif;
  font-size: 5rem;
  color: var(--gold);
  line-height: 1.3;
  vertical-align: middle;
}
.wc-rtgs {
  text-align: center;
  color: var(--dim);
  font-style: italic;
  font-size: 1rem;
  margin-bottom: 0.15rem;
}
.wc-en {
  text-align: center;
  font-size: 1.05rem;
  color: var(--parchment);
  margin-bottom: 0.6rem;
}
.wc-example { margin-top: 0.4rem; }

/* ── Word decomposition ──────────────────────────────────────────────────── */
.wc-decomp {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  margin: 0.6rem 0 0.2rem;
  padding: 0.5rem 0.4rem;
  background: rgba(0,0,0,0.25);
  border-radius: 6px;
}
.decomp-cluster {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.15rem;
}
.decomp-char {
  font-family: 'Noto Sans Thai', serif;
  font-size: 1.8rem;
  line-height: 1;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.25rem 0.4rem;
  cursor: default;
  transition: border-color 0.1s, color 0.1s;
  min-width: 2.4rem;
  text-align: center;
  pointer-events: all;
}
.decomp-char.is-cons  { border-color: var(--jade); }
.decomp-char.is-vowel { border-color: var(--royal-blue); }
.decomp-char.is-tone  { border-color: var(--saffron); }
.decomp-char.is-other { border-color: var(--border); color: var(--dim); }
.decomp-char:hover    { border-color: var(--gold) !important; color: var(--gold); }
.decomp-label {
  font-size: 0.62rem;
  color: var(--dim);
  text-align: center;
  max-width: 3.5rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#script-tooltip {
  position: fixed;
  z-index: 20000;
  pointer-events: none;
  background: #2a1c08;
  border: 1px solid var(--saffron);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
  max-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.7);
  display: none;
  font-size: 0.82rem;
  line-height: 1.6;
}
#script-tooltip .st-char {
  font-family: 'Noto Sans Thai', serif;
  font-size: 2rem;
  color: var(--saffron);
  font-weight: bold;
  display: block;
  text-align: center;
  line-height: 1.2;
}
#script-tooltip .st-row { color: var(--parchment); }
#script-tooltip .st-row span { color: var(--dim); font-style: italic; }

/* ── Tooltip ─────────────────────────────────────────────────────────────── */
#word-tooltip {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  background: #2a1c08;
  border: 1px solid var(--gold);
  border-radius: 5px;
  padding: 0.4rem 0.7rem;
  max-width: 220px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  display: none;
  font-size: 0.82rem;
  line-height: 1.5;
}
#word-tooltip .tt-thai {
  font-family: 'Noto Sans Thai', 'Leelawadee UI', serif;
  font-size: 1.3rem;
  color: var(--saffron);
  font-weight: bold;
}
#word-tooltip .tt-rtgs { color: var(--dim); font-style: italic; }
#word-tooltip .tt-en   { color: var(--parchment); }

/* ── Tone Drill ──────────────────────────────────────────────────────────── */
</style>
</head>
<body>
<div id="shell">
  <header>
    <button id="mute-btn" title="Toggle music">🔊</button>
    <div class="title">THE LAST BAHT BUS</div>
    <div class="sub">a Pattaya misadventure · ❖ Soi Sanuk ❖</div>
  </header>
  <a id="ad-mini" href="https://soisanuk.github.io/" target="_blank" rel="noopener">
    😘 The girls speak two languages. You barely speak one. <b>Learn Thai →</b>
  </a>
  <div id="term-out"></div>
  <div id="chips">
    <button class="chip" data-cmd="look">look</button>
    <button class="chip" data-cmd="n">N</button>
    <button class="chip" data-cmd="s">S</button>
    <button class="chip" data-cmd="e">E</button>
    <button class="chip" data-cmd="w">W</button>
    <button class="chip" data-cmd="in">in</button>
    <button class="chip" data-cmd="out">out</button>
    <button class="chip" data-cmd="i">inv</button>
    <button class="chip" data-cmd="take ">take…</button>
    <button class="chip" data-cmd="talk to ">talk…</button>
    <button class="chip" data-cmd="ask ">ask…</button>
    <button class="chip" data-cmd="wai">wai</button>
    <button class="chip" data-cmd="read sign">sign</button>
    <button class="chip" data-cmd="light">light</button>
    <button class="chip" data-cmd="help">help</button>
  </div>
  <div id="term-suggest"></div>
  <div id="input-row">
    <span class="prompt">❯</span>
    <input id="term-in" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" placeholder="what do you do?">
  <button id="term-send" title="Send" aria-label="Send command">➤</button>
  </div>
  <div id="fab-stack">
    <button id="bell-fab" title="Ring the bell" aria-label="Ring the bell">🔔</button>
    <button id="msg-fab" title="Read your messages" aria-label="Read your messages">💬</button>
  </div>
</div>
<a id="ad" href="https://soisanuk.github.io/" target="_blank" rel="noopener">
  <div class="ad-hey">HEY HANDSOME 😘</div>
  <div class="ad-line">The girls speak two languages.<br>You barely speak one.<br>
    Candy notices these things.</div>
  <span class="ad-cta">LEARN THAI →</span>
  <div class="ad-sub">SOI SANUK trainer · free · no signup<br>❖ PATTAYA EDITION ❖</div>
</a>
<!-- vendored word-card modal mounts (see wordcard.js) -->
<div id="wc-overlay"></div>
<div id="script-tooltip"></div>
